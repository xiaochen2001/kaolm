<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>芝士火鸡烤冷面·点餐</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body{background:#fff8f5;padding:15px;padding-bottom:120px;}
        .header{text-align:center;color:#e63946;font-size:24px;font-weight:bold;margin:20px 0;}
        .tip{background:#ffebee;color:#c62828;padding:12px;border-radius:10px;text-align:center;font-size:15px;font-weight:bold;margin-bottom:15px;}
        .section-title{color:#d62828;font-size:18px;margin:15px 0 8px;}
        .menu-item{background:#fff;border-radius:12px;padding:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;box-shadow:0 2px 5px #0001;}
        .item-info .name{font-size:16px;font-weight:bold;}
        .item-info .price{color:#e63946;margin-top:5px;}
        .count-control{display:flex;align-items:center;gap:10px;}
        .count-btn{width:32px;height:32px;background:#e63946;color:#fff;border:none;border-radius:6px;font-size:18px;cursor:pointer;}
        .count-text{font-size:16px;min-width:24px;text-align:center;}
        textarea{width:100%;height:80px;padding:10px;border-radius:8px;border:1px solid #ddd;resize:none;margin:10px 0;}
        .total-bar{position:fixed;bottom:0;left:0;width:100%;background:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -2px 10px #0001;}
        .total-text{font-size:18px;font-weight:bold;}
        .submit-btn{background:#07c160;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:16px;}

        .pay-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:999;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:20px;}
        .notice{color:#ffeb3b;font-size:17px;font-weight:bold;margin-bottom:20px;text-align:center;}
        .pay-box{display:flex;gap:30px;flex-wrap:wrap;justify-content:center;}
        .pay-col{text-align:center;}
        .pay-col img{width:180px;height:180px;padding:10px;background:#fff;border-radius:10px;cursor:pointer;}
        .close-btn{background:#fff;color:#333;border:none;padding:10px 25px;border-radius:8px;margin-top:25px;font-size:16px;}
    </style>
</head>
<body>

<div class="header">🔥芝士火鸡烤冷面</div>
<div class="tip">提交订单 → 点击图片放大 → 长按识别付款</div>

<div class="section-title">经典烤冷面</div>
<div class="menu-item">
    <div class="item-info"><div class="name">标准烤冷面</div><div class="price">9元</div></div>
    <div class="count-control"><button onclick="add('标准烤冷面',9,-1)">-</button><span id="a1">0</span><button onclick="add('标准烤冷面',9,1)">+</button></div>
</div>
<div class="menu-item">
    <div class="item-info"><div class="name">大份烤冷面</div><div class="price">11元</div></div>
    <div class="count-control"><button onclick="add('大份烤冷面',11,-1)">-</button><span id="a2">0</span><button onclick="add('大份烤冷面',11,1)">+</button></div>
</div>

<div class="section-title">特色风味</div>
<div class="menu-item">
    <div class="item-info"><div class="name">辣白菜烤冷面</div><div class="price">11元</div></div>
    <div class="count-control"><button onclick="add('辣白菜烤冷面',11,-1)">-</button><span id="a3">0</span><button onclick="add('辣白菜烤冷面',11,1)">+</button></div>
</div>
<div class="menu-item">
    <div class="item-info"><div class="name">里脊烤冷面</div><div class="price">12元</div></div>
    <div class="count-control"><button onclick="add('里脊烤冷面',12,-1)">-</button><span id="a4">0</span><button onclick="add('里脊烤冷面',12,1)">+</button></div>
</div>

<div class="section-title">芝士爆款</div>
<div class="menu-item">
    <div class="item-info"><div class="name">芝士玉米烤冷面</div><div class="price">13元</div></div>
    <div class="count-control"><button onclick="add('芝士玉米烤冷面',13,-1)">-</button><span id="a5">0</span><button onclick="add('芝士玉米烤冷面',13,1)">+</button></div>
</div>
<div class="menu-item">
    <div class="item-info"><div class="name">芝士鸡排烤冷面</div><div class="price">15元</div></div>
    <div class="count-control"><button onclick="add('芝士鸡排烤冷面',15,-1)">-</button><span id="a6">0</span><button onclick="add('芝士鸡排烤冷面',15,1)">+</button></div>
</div>

<div class="section-title">网红爆款</div>
<div class="menu-item">
    <div class="item-info"><div class="name">三养火鸡面烤冷面</div><div class="price">14元</div></div>
    <div class="count-control"><button onclick="add('三养火鸡面烤冷面',14,-1)">-</button><span id="a7">0</span><button onclick="add('三养火鸡面烤冷面',14,1)">+</button></div>
</div>
<div class="menu-item">
    <div class="item-info"><div class="name">芝士三养火鸡面烤冷面</div><div class="price">18元</div></div>
    <div class="count-control"><button onclick="add('芝士三养火鸡面烤冷面',18,-1)">-</button><span id="a8">0</span><button onclick="add('芝士三养火鸡面烤冷面',18,1)">+</button></div>
</div>

<textarea placeholder="备注：辣度、忌口、少放香菜等"></textarea>

<div class="total-bar">
    <div class="total-text">合计：<span id="total">0</span> 元</div>
    <button class="submit-btn" onclick="submit()">提交订单</button>
</div>

<div class="pay-modal" id="payModal">
    <div class="notice">点击图片自动全屏<br>长按即可识别二维码付款</div>
    <div class="pay-box">
        <div class="pay-col">
            <p>微信支付</p>
            <img src="wechat.jpg" onclick="openPic(this.src)">
        </div>
        <div class="pay-col">
            <p>支付宝支付</p>
            <img src="alipay.jpg" onclick="openPic(this.src)">
        </div>
    </div>
    <button class="close-btn" onclick="closePay()">已支付 关闭</button>
</div>

<script>
let cart = {};
const map = {
    "标准烤冷面":"a1","大份烤冷面":"a2","辣白菜烤冷面":"a3",
    "里脊烤冷面":"a4","芝士玉米烤冷面":"a5","芝士鸡排烤冷面":"a6",
    "三养火鸡面烤冷面":"a7","芝士三养火鸡面烤冷面":"a8"
};

function add(name,price,delta){
    if(!cart[name]) cart[name]={cnt:0,p:price};
    cart[name].cnt += delta;
    if(cart[name].cnt<0) cart[name].cnt=0;
    document.getElementById(map[name]).innerText=cart[name].cnt;
    calcTotal();
}

function calcTotal(){
    let sum=0;
    for(let k in cart) sum += cart[k].cnt * cart[k].p;
    document.getElementById("total").innerText=sum;
}

function submit(){
    let t = parseInt(document.getElementById("total").innerText);
    if(t<=0){alert("请先选择商品");return;}
    document.getElementById("payModal").style.display="flex";
}
function closePay(){
    document.getElementById("payModal").style.display="none";
}

// 微信、支付宝都适配：跳转原生看图，长按自动识别
function openPic(src){
    window.location.href = src;
}
</script>

</body>
</html>s
